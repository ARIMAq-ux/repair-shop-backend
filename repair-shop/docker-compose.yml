version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: repair-postgres
    environment:
      POSTGRES_DB: repairdb
      POSTGRES_USER: libuser
      POSTGRES_PASSWORD: libpassword
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libuser -d repairdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: repair-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/repairdb
      SPRING_DATASOURCE_USERNAME: libuser
      SPRING_DATASOURCE_PASSWORD: libpassword
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351665468576D5A7134743777217A25432A462D4A614E645267556B5870
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"